<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">✉️</div>
            <h1>Verify Your Email</h1>
            <p class="subtitle">Enter the code sent to your registered email address.</p>

            {% if error %}
            <p style="color:red; text-align:center;">{{ error }}</p>
            {% endif %}

            <form action="{{ url_for('verify') }}" method="POST">
                <div class="input-group">
                    <label for="code">Verification Code</label>
                    <input type="text" id="code" name="code" placeholder="Enter code" autocomplete="off">
                </div>
                <button type="submit" class="btn-login">Verify</button>
            </form>

            <div class="bottom-links">
                <p>Didn't receive a code? <a href="{{ url_for('login') }}">Try signing in again</a>.</p>
            </div>
        </div>
    </div>
</body>

</html>
